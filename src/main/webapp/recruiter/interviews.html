            <nav class="sidebar-nav">

                    <span class="nav-icon">

                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    </span>
                    <span>My Jobs</span>
                </a>
                <a href="applicants.html" class="nav-item animate-slide-in stagger-3">
                    <span class="nav-icon">

                    <span>Applicants</span>
                </a>
                <a href="interviews.html" class="nav-item active animate-slide-in stagger-4">

                        <div class="flex gap-2">
                            <button class="btn btn-outline btn-sm flex items-center" style="gap: 0.5rem;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

                                List View
                            </button>
                        </div>
                    </div>
                </div>

                <div id="interviews-container" class="grid grid-cols-2 gap-6 animate-fade-in stagger-2">
                    <!-- JS loaded -->
                </div>

            </main>
        </div>

    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/recruiter.js"></script>
