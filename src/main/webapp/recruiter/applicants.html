<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Applicants - Smart Campus</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <div class="dashboard-layout">
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <span class="brand-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>
                    </span>
                    <span>Smart Campus</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item animate-slide-in stagger-1">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                    </span>
                    <span>Dashboard</span>
                </a>
                <a href="post-job.html" class="nav-item animate-slide-in stagger-2">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2-2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </span>
                    <span>Post a Job</span>
                </a>
                <a href="my-jobs.html" class="nav-item animate-slide-in stagger-3">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    </span>
                    <span>My Jobs</span>
                </a>
                <a href="applicants.html" class="nav-item active animate-slide-in stagger-3">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </span>
                    <span>Applicants</span>
                </a>
                <a href="interviews.html" class="nav-item animate-slide-in stagger-4">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </span>
                    <span>Interviews</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="nav-item text-error" style="color: var(--error);">
                    <span class="nav-icon" style="color: var(--error);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </span>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <div class="main-content">
            
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-toggle" id="mobile-toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h2 class="page-title">Manage Applicants (Job #<span id="jobIdDisplay"></span>)</h2>
                </div>
            </header>

            <main class="content-area">
                
                <div class="flex justify-between items-center mb-4" style="gap: 1rem;">
                    <div class="flex gap-2">
                        <button class="btn btn-primary btn-sm">Bulk Shortlist</button>
                        <button class="btn btn-error btn-sm" style="background-color: var(--error); color: white; border-color: var(--error);">Bulk Reject</button>
                    </div>
                    <div class="flex gap-2">
                        <select style="padding: 0.5rem; border: 1px solid var(--border-color); background: var(--bg-surface-light); border-radius: var(--radius-md); font-size: 0.875rem; color: var(--text-primary);">
                            <option value="">Filter by Status</option>
                            <option value="Applied">Applied</option>
                            <option value="Shortlisted">Shortlisted</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                </div>

                <div class="table-container animate-fade-in stagger-1" style="background: var(--bg-surface); padding: 1.5rem;">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 40px;"><input type="checkbox" id="selectAll"></th>
                                <th>Student</th>
                                <th>Applied Date</th>
                                <th>Status</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="applicants-tbody">
                            <!-- JS loaded -->
                        </tbody>
                    </table>
                </div>

            </main>
        </div>
    </div>

    <!-- Scheduling Modal -->
    <div id="scheduleModal" class="modal-backdrop">
        <div class="modal card">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-primary" style="font-size: 1.25rem; font-weight: 700;">Schedule Interview</h3>
                <button type="button" onclick="closeScheduleModal()" style="background: none; border: none; cursor: pointer; color: var(--text-secondary);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            
            <form id="scheduleForm">
                <input type="hidden" id="sched-studentId" />
                <input type="hidden" id="sched-jobId" />
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label>Date</label>
                        <input type="date" id="sched-date" required />
                    </div>
                    <div>
                        <label>Time</label>
                        <input type="time" id="sched-time" required />
                    </div>
                </div>

                <div class="mb-4">
                    <label>Mode</label>
                    <select id="sched-mode" required>
                        <option value="Online">Online</option>
                        <option value="In-Person">In-Person</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label>Location / Meeting Link</label>
                    <input type="text" id="sched-location" required placeholder="https://meet.google.com/... or Room 101" />
                </div>

                <div class="flex justify-end gap-4">
                    <button type="button" class="btn btn-outline" onclick="closeScheduleModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary text-center">Confirm Schedule</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/recruiter.js"></script>
    <script>
        document.getElementById('selectAll').addEventListener('change', function() {
            const checkboxes = document.querySelectorAll('.bulk-cb');
            checkboxes.forEach(cb => cb.checked = this.checked);
        });
    </script>
</body>
</html>
