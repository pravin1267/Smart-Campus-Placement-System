<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Smart Campus</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <div class="dashboard-layout">
        
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <span class="brand-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                    </span>
                    <span>Smart Campus</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active animate-slide-in stagger-1">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                    </span>
                    <span>Dashboard</span>
                </a>
                <a href="jobs.html" class="nav-item animate-slide-in stagger-2">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    </span>
                    <span>Browse Jobs</span>
                </a>
                <a href="applications.html" class="nav-item animate-slide-in stagger-3">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    </span>
                    <span>My Applications</span>
                </a>
                <a href="interviews.html" class="nav-item animate-slide-in stagger-4">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </span>
                    <span>Interviews</span>
                </a>
                <a href="profile.html" class="nav-item animate-slide-in stagger-4">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </span>
                    <span>Profile</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="nav-item text-error" style="color: var(--error);">
                    <span class="nav-icon" style="color: var(--error);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </span>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-toggle" id="mobile-toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h2 class="page-title">Student Dashboard</h2>
                </div>
                
                <div class="topbar-right">
                    <button class="notification-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span class="notification-badge">3</span>
                    </button>
                    <div class="user-profile">
                        <div class="user-info" style="text-align: right;">
                            <span class="user-name" id="user-name">Loading...</span>
                            <span class="user-role" id="user-role">Student</span>
                        </div>
                        <div class="avatar" id="user-initial">?</div>
                    </div>
                </div>
            </header>

            <!-- Scrollable Area -->
            <main class="content-area">
                <div id="stats-grid" class="stats-grid">
                    <!-- Loaded via JS -->
                </div>

                <div class="grid grid-cols-2 gap-6" style="grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);">
                    
                    <div class="card animate-fade-in stagger-4">
                        <h3 class="text-primary mb-4" style="font-size: 1.25rem; font-weight: 700;">Upcoming Milestones</h3>
                        <div style="background: var(--bg-surface-light); border: 1px solid var(--border-color); border-radius: var(--radius-lg); text-align: center; padding: 2rem; margin-top: 1rem;">
                            <h4 style="font-size: 1.125rem; font-weight: 600; color: var(--primary);">No immediate actions required.</h4>
                            <p class="text-muted mt-2" style="font-size: 0.875rem;">Keep applying to jobs to increase your placement chances!</p>
                            <a href="jobs.html" class="btn btn-primary mt-4">Browse Jobs</a>
                        </div>
                    </div>

                    <div class="card animate-fade-in stagger-4">
                        <h3 class="mb-4 text-primary" style="font-size: 1.25rem; font-weight: 700;">Recent Activity</h3>
                        <div id="recent-activity" style="border-top: 1px solid var(--border-color); margin: 0 -1.5rem; padding: 1rem 1.5rem;">
                            <!-- Loaded via JS -->
                            <div class="text-center text-muted" style="padding: 1rem;">Loading activity...</div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/student.js"></script>
</body>
</html>
