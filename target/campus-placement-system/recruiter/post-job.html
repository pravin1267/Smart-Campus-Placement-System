<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job - Smart Campus</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        .rte-toolbar {
            background-color: var(--bg-surface-light);
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            display: flex;
            gap: 0.5rem;
        }
        .rte-toolbar button {
            background: transparent;
            border: 1px solid transparent;
            color: var(--primary);
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
        }
        .rte-toolbar button:hover {
            background: var(--bg-hover);
            border-color: var(--border-color);
        }
        .rte-editor {
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            min-height: 200px;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <span class="brand-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>
                    </span>
                    <span>Smart Campus</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item animate-slide-in stagger-1">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                    </span>
                    <span>Dashboard</span>
                </a>
                <a href="post-job.html" class="nav-item active animate-slide-in stagger-2">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </span>
                    <span>Post a Job</span>
                </a>
                <a href="my-jobs.html" class="nav-item animate-slide-in stagger-3">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    </span>
                    <span>My Jobs</span>
                </a>
                <a href="applicants.html" class="nav-item animate-slide-in stagger-3">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </span>
                    <span>Applicants</span>
                </a>
                <a href="interviews.html" class="nav-item animate-slide-in stagger-4">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </span>
                    <span>Interviews</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="nav-item text-error" style="color: var(--error);">
                    <span class="nav-icon" style="color: var(--error);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </span>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <div class="main-content">
            
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-toggle" id="mobile-toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h2 class="page-title">Post a Job</h2>
                </div>
                
                <div class="topbar-right">
                    <div class="user-profile">
                        <div class="user-info" style="text-align: right;">
                            <span class="user-name" id="user-name">Loading...</span>
                            <span class="user-role text-secondary" id="user-role">Recruiter</span>
                        </div>
                        <div class="avatar" id="user-initial">?</div>
                    </div>
                </div>
            </header>

            <main class="content-area">
                
                <div class="card animate-fade-in stagger-1 max-w-4xl mx-auto" style="max-width: 900px; margin: 0 auto;">
                    <form id="postJobForm">
                        <div class="grid grid-cols-2 gap-6 mb-4">
                            <div>
                                <label>Job Title <span class="text-error">*</span></label>
                                <input type="text" id="j_title" required placeholder="e.g. Software Engineer" />
                            </div>
                            <div>
                                <label>Company Name <span class="text-error">*</span></label>
                                <input type="text" id="j_company" required placeholder="e.g. Google" />
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-6 mb-4">
                            <div>
                                <label>Job Type <span class="text-error">*</span></label>
                                <select id="j_type" required>
                                    <option value="Full-time">Full-time</option>
                                    <option value="Part-time">Part-time</option>
                                    <option value="Internship">Internship</option>
                                    <option value="Contract">Contract</option>
                                </select>
                            </div>
                            <div>
                                <label>Location</label>
                                <input type="text" id="j_loc" placeholder="e.g. Remote, Bangalore, CA" />
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-6 mb-4">
                            <div>
                                <label>CTC / Salary Range</label>
                                <input type="text" id="j_ctc" placeholder="e.g. $100k - $120k / 12 LPA" />
                            </div>
                            <div>
                                <label>Application Deadline <span class="text-error">*</span></label>
                                <input type="date" id="j_deadline" required />
                            </div>
                        </div>

                        <div class="mb-4">
                            <label>Eligibility Criteria</label>
                            <input type="text" id="j_eligibility" placeholder="e.g. B.Tech CS, CGPA > 8.0" />
                        </div>

                        <div class="mb-6">
                            <label>Job Description <span class="text-error">*</span></label>
                            <div class="rte-toolbar">
                                <button type="button" class="rtc-btn" data-wrap="b">B</button>
                                <button type="button" class="rtc-btn" data-wrap="i">I</button>
                                <button type="button" class="rtc-btn" data-wrap="ul">List</button>
                            </div>
                            <textarea id="j_desc" class="rte-editor" required placeholder="Describe the role and responsibilities..."></textarea>
                        </div>

                        <div class="flex justify-end gap-4 mt-6" style="gap: 1rem;">
                            <button type="button" class="btn btn-outline" onclick="window.history.back()">Cancel</button>
                            <button type="submit" class="btn btn-primary" id="submitJobBtn">Post Job</button>
                        </div>
                    </form>
                </div>

            </main>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/recruiter.js"></script>
</body>
</html>
